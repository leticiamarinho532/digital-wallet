# 2  serviços a serem construidos e mantidos:
    # Aplicação
    # testes
# talvez ter uma imagem do servidor

version: '3'
services:
    composer:
        build:
            context: .
            dockerfile: dockerfile-composer
        environment: 
            - COMPOSE_CACHE_DIR=./app/var/cache/composer
        restart: "no"
        volumes:
            - ./:/src/app
        depends_on:
            - app
    app:
        build:
            context: .
            dockerfile: dockerfile-app
        restart: always
        ports: 
            - 80:80
        volumes:
            - ./:/src/app/
    tests:
        image: php:8.1-cli
        restart: "no"
        volumes:
            - ./:/src/app
        working_dir: /src/app
        entrypoint: vendor/bin/phpunit
        depends_on: 
            - composer
