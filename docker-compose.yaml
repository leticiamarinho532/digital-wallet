# 2  serviços a serem construidos e mantidos:
    # Aplicação
    # testes
# talvez ter uma imagem do servidor

version: '3'
services:
    php:
        image: php:8.1-cli
        restart: never
        volumes:
            - .:./
        working_dir: /src/app
    composer:
        image: composer
        environment: 
            - COMPOSE_CACHE_DIR=./app/var/cache/composer
        restart: never
        volumes:
            - ./:./src/app
        depends_on: 
            - php
            - app
    app:
        build: dockerfile-app
        restart: always
        port: 
            - 80:80
        volumes:
            - ./:./src/app
        networks:
            - tests
    tests:
        image: php:8.1-cli
        restart: never
        volumes:
            - ./:./src/app
        working_dir: /src/app
        entrypoint: vendor/bin/phpunit
        depends_on: 
            - composer
        networks:
            - app
